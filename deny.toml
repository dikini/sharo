[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-3-Clause",
  "ISC",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",
]

[advisories]
version = 2
yanked = "warn"

[bans]
multiple-versions = "allow"
wildcards = "deny"
