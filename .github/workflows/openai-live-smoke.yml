name: openai-live-smoke

on:
  workflow_dispatch:

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secret
        run: |
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "OPENAI_API_KEY secret is required for live smoke workflow" >&2
            exit 1
          fi

      - name: Run live OpenAI smoke
        run: scripts/openai-live-smoke.sh --goal "Return one short sentence confirming live smoke."
