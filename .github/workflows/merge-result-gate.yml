name: merge-result-gate

on:
  pull_request:
  merge_group:

jobs:
  merge-result:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run merge-result gate
        run: scripts/check-merge-result.sh
