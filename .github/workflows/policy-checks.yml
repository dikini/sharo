name: policy-checks

on:
  push:
  pull_request:

jobs:
  policy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_CACHE_SIZE: 2G
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install shell quality tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt ripgrep

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Resolve commit range
        id: range
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="origin/${{ github.base_ref }}...${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="${{ github.sha }}^!"
            else
              RANGE="$BEFORE...${{ github.sha }}"
            fi
          fi
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Using range: $RANGE"

      - name: Classify CI scope
        id: scope
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          cargo_inputs_changed=false
          if git diff --name-only "$range" | rg -n '(^Cargo\.lock$|(^|/)Cargo\.toml$)' >/dev/null 2>&1; then
            cargo_inputs_changed=true
          fi
          echo "cargo_inputs_changed=$cargo_inputs_changed" >> "$GITHUB_OUTPUT"
          echo "cargo_inputs_changed=$cargo_inputs_changed"

      - name: Run canonical verification entrypoint
        run: just verify-ci

      - name: Run shell quality checks
        run: scripts/check-shell-quality.sh --all

      - name: Install dependency security tools
        if: steps.scope.outputs.cargo_inputs_changed == 'true'
        run: cargo install --locked cargo-deny cargo-audit

      - name: Run dependency and security checks
        if: steps.scope.outputs.cargo_inputs_changed == 'true'
        run: scripts/check-dependencies-security.sh --range "${{ steps.range.outputs.range }}"

      - name: Enforce Rust policy
        run: scripts/check-rust-policy.sh

      - name: Run Rust workspace tests
        run: scripts/check-rust-tests.sh --all

      - name: Install bats-core
        run: scripts/install-bats.sh >/dev/null

      - name: Enforce MVP matrix mapping gate
        run: scripts/check-mvp-matrix-map.sh

      - name: Run shell tests
        run: scripts/run-shell-tests.sh --range "${{ steps.range.outputs.range }}"

      - name: Run docs lint (strict profile) in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          mapfile -t docs_files < <(
            git diff --name-only "$range" -- README.md docs AGENTS.md \
              | sed '/^$/d' \
              | rg '(^README\.md$|^AGENTS\.md$|\.md$)' \
              | sort -u
          )
          if [[ "${#docs_files[@]}" -eq 0 ]]; then
            echo "doc-lint: no docs changed in range"
            exit 0
          fi
          for f in "${docs_files[@]}"; do
            [[ -f "$f" ]] || continue
            scripts/doc-lint.sh --path "$f" --strict-new
          done

      - name: Run docs portability checks in range
        run: scripts/check-doc-portability.sh --range "${{ steps.range.outputs.range }}"

      - name: Run docs terminology checks in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          mapfile -t docs_files < <(
            git diff --name-only "$range" -- README.md docs AGENTS.md \
              | sed '/^$/d' \
              | rg '(^README\.md$|^AGENTS\.md$|\.md$)' \
              | sort -u
          )
          if [[ "${#docs_files[@]}" -eq 0 ]]; then
            echo "doc-terms: no docs changed in range"
            exit 0
          fi
          for f in "${docs_files[@]}"; do
            [[ -f "$f" ]] || continue
            scripts/check-doc-terms.sh --path "$f"
          done

      - name: Validate task registry
        run: scripts/check-tasks-registry.sh

      - name: Enforce sync manifest policy in range
        run: scripts/check-sync-manifest.sh --range "${{ steps.range.outputs.range }}"

      - name: Enforce task registry sync in range
        run: scripts/check-tasks-sync.sh --range "${{ steps.range.outputs.range }}"

      - name: Enforce Conventional Commits in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          commits="$(git rev-list --no-merges "$range")"
          if [[ -z "$commits" ]]; then
            echo "No non-merge commits in range."
            exit 0
          fi
          while IFS= read -r sha; do
            tmp="$(mktemp)"
            git log -1 --pretty=%B "$sha" | head -n1 > "$tmp"
            echo "Checking $sha: $(cat "$tmp")"
            scripts/check-conventional-commit.sh "$tmp"
            rm -f "$tmp"
          done <<< "$commits"

      - name: Enforce changelog update in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          if git diff --name-only "$range" | grep -qx "CHANGELOG.md"; then
            echo "CHANGELOG.md updated in range."
            exit 0
          fi
          echo "policy-check failed: CHANGELOG.md must be updated in this push/PR range." >&2
          exit 1

      - name: Run flaky regression replay when daemon paths changed
        run: scripts/check-flaky-regressions.sh --range "${{ steps.range.outputs.range }}"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
