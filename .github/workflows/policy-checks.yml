name: policy-checks

on:
  push:
  pull_request:

jobs:
  policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install shell quality tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt ripgrep

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run canonical verification entrypoint
        run: just verify

      - name: Run workflow lint checks
        uses: rhysd/actionlint@v1.7.11

      - name: Run shell quality checks
        run: scripts/check-shell-quality.sh --all

      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz

      - name: Install nightly toolchain for fuzzing
        run: rustup toolchain install nightly --profile minimal --component llvm-tools-preview

      - name: Install dependency security tools
        run: cargo install --locked cargo-deny cargo-audit

      - name: Run dependency and security checks
        run: scripts/check-dependencies-security.sh

      - name: Enforce Rust policy
        run: scripts/check-rust-policy.sh

      - name: Run Rust workspace tests
        run: scripts/check-rust-tests.sh --all

      - name: Run fuzz smoke checks
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: scripts/check-fuzz.sh --smoke --all

      - name: Run property test profile
        run: cargo test -p sharo-core --test protocol_tests prop_protocol_roundtrip_preserves_task_summary_fields

      - name: Run loom model checks
        run: cargo test -p sharo-daemon --test loom_submit_shutdown -- --nocapture

      - name: Install bats-core
        run: scripts/install-bats.sh >/dev/null

      - name: Enforce MVP matrix mapping gate
        run: scripts/check-mvp-matrix-map.sh

      - name: Run shell tests
        run: scripts/run-shell-tests.sh --all

      - name: Run docs lint (strict profile)
        run: scripts/doc-lint.sh --strict-new

      - name: Run docs terminology checks
        run: scripts/check-doc-terms.sh

      - name: Validate task registry
        run: scripts/check-tasks-registry.sh

      - name: Resolve commit range
        id: range
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            RANGE="origin/${{ github.base_ref }}...${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="${{ github.sha }}^!"
            else
              RANGE="$BEFORE...${{ github.sha }}"
            fi
          fi
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Using range: $RANGE"

      - name: Enforce sync manifest policy in range
        run: scripts/check-sync-manifest.sh --range "${{ steps.range.outputs.range }}"

      - name: Enforce task registry sync in range
        run: scripts/check-tasks-sync.sh --range "${{ steps.range.outputs.range }}"

      - name: Enforce Conventional Commits in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          commits="$(git rev-list --no-merges "$range")"
          if [[ -z "$commits" ]]; then
            echo "No non-merge commits in range."
            exit 0
          fi
          while IFS= read -r sha; do
            tmp="$(mktemp)"
            git log -1 --pretty=%B "$sha" | head -n1 > "$tmp"
            echo "Checking $sha: $(cat "$tmp")"
            scripts/check-conventional-commit.sh "$tmp"
            rm -f "$tmp"
          done <<< "$commits"

      - name: Enforce changelog update in range
        run: |
          set -euo pipefail
          range="${{ steps.range.outputs.range }}"
          if git diff --name-only "$range" | grep -qx "CHANGELOG.md"; then
            echo "CHANGELOG.md updated in range."
            exit 0
          fi
          echo "policy-check failed: CHANGELOG.md must be updated in this push/PR range." >&2
          exit 1
