name: rust-hygiene

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CARGO_UDEPS_VERSION: "0.1.60"
      CARGO_MSRV_VERSION: "0.19.2"
      CARGO_SEMVER_CHECKS_VERSION: "0.47.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install nightly toolchain for cargo-udeps
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo hygiene tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cargo/bin"

          install_release_tool() {
            local repo="$1"
            local version="$2"
            local asset="$3"
            local binary="$4"
            local tmp_dir
            tmp_dir="$(mktemp -d)"
            trap 'rm -rf "$tmp_dir"' RETURN
            curl -fsSL \
              "https://github.com/${repo}/releases/download/v${version}/${asset}" \
              -o "$tmp_dir/$asset"
            tar -xzf "$tmp_dir/$asset" -C "$tmp_dir"
            install -m 0755 "$tmp_dir/$binary" "$HOME/.cargo/bin/$binary"
            rm -rf "$tmp_dir"
            trap - RETURN
          }

          install_release_tool \
            "est31/cargo-udeps" \
            "$CARGO_UDEPS_VERSION" \
            "cargo-udeps-v${CARGO_UDEPS_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            "cargo-udeps"

          install_release_tool \
            "foresterre/cargo-msrv" \
            "$CARGO_MSRV_VERSION" \
            "cargo-msrv-x86_64-unknown-linux-gnu-v${CARGO_MSRV_VERSION}.tgz" \
            "cargo-msrv"

          install_release_tool \
            "obi1kenobi/cargo-semver-checks" \
            "$CARGO_SEMVER_CHECKS_VERSION" \
            "cargo-semver-checks-x86_64-unknown-linux-gnu.tar.gz" \
            "cargo-semver-checks"

      - name: Run strict rust hygiene checks
        run: scripts/check-rust-hygiene.sh --strict --check all --baseline-ref origin/main
