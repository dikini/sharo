name: rust-hygiene

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install nightly toolchain for cargo-udeps
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo hygiene tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-udeps@0.1.60,cargo-msrv@0.19.2,cargo-semver-checks@0.47.0
          fallback: none

      - name: Run strict rust hygiene checks
        run: scripts/check-rust-hygiene.sh --strict --check all --baseline-ref origin/main
